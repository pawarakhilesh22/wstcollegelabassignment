<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="container mt-5">

    <h2 class="text-center mb-4">Student Registration</h2>

    <form id="studentForm" class="border p-4 rounded shadow">

        <!-- Name -->
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="Enter name" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter email" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <!-- Gender -->
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" value="Male" required>
                <label class="form-check-label">Male</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" value="Female">
                <label class="form-check-label">Female</label>
            </div>
        </div>

        <!-- Skills -->
        <div class="mb-3">
            <label class="form-label">Skills</label>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="HTML">
                <label class="form-check-label">HTML</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="CSS">
                <label class="form-check-label">CSS</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="JavaScript">
                <label class="form-check-label">JavaScript</label>
            </div>
        </div>

        <!-- City -->
        <div class="mb-3">
            <label for="city" class="form-label">City</label>
            <select id="city" name="city" class="form-select" required>
                <option value="">Select City</option>
                <option>Pune</option>
                <option>Mumbai</option>
                <option>Delhi</option>
            </select>
        </div>

        <!-- Address -->
        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea id="address" name="address" class="form-control" rows="3" placeholder="Enter address"></textarea>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-primary w-100">Register</button>
        <id="studentForm" class="border p-4 rounded shadow">
    </form>

    <!-- <button type="submit" class="btn btn-primary w-100">
    Register
</button> -->


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>

</body>
</html>
