<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<h2>Student Registration</h2>

<form>
    Name:
    <input type="text" placeholder="Enter name" required><br><br>

    Email:
    <input type="email" placeholder="Enter email" required><br><br>

    Password:
    <input type="password" placeholder="Enter password" required><br><br>

    Gender:
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female<br><br>

    Skills:
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> JavaScript<br><br>

    City:
    <select required>
        <option>Pune</option>
        <option>Mumbai</option>
        <option>Delhi</option>
    </select><br><br>

    Address:<br>
    <textarea placeholder="Enter address"></textarea><br><br>

    <input type="submit" value="Register">
</form>

</body>
</html>
